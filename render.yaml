services:
  - type: web
    name: stock-agent-webhook
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn webhook:app
    plan: free
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GH_GIST_TOKEN
        sync: false
      - key: GIST_ID
        sync: false
