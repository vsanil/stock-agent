services:
  - type: web
    name: stock-agent-webhook
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn webhook:app
    plan: free
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GH_GIST_TOKEN
        sync: false
      - key: GIST_ID
        sync: false

  # ── Scheduled runs (Render cron — fires on exact UTC time, no GitHub delay) ──

  - type: cron
    name: stock-agent-morning
    runtime: python
    schedule: "0 12 * * 1-5"       # 8:00 AM ET (Mon–Fri) — morning briefing
    buildCommand: pip install -r requirements.txt
    startCommand: python agent.py
    envVars:
      - key: RUN_MODE
        value: morning
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GH_GIST_TOKEN
        sync: false
      - key: GIST_ID
        sync: false

  - type: cron
    name: stock-agent-confirmation
    runtime: python
    schedule: "30 14 * * 1-5"      # 10:30 AM ET (Mon–Fri) — confirmation run
    buildCommand: pip install -r requirements.txt
    startCommand: python agent.py
    envVars:
      - key: RUN_MODE
        value: confirmation
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GH_GIST_TOKEN
        sync: false
      - key: GIST_ID
        sync: false

  - type: cron
    name: stock-agent-eod
    runtime: python
    schedule: "30 19 * * 1-5"      # 3:30 PM ET (Mon–Fri) — end-of-day check
    buildCommand: pip install -r requirements.txt
    startCommand: python agent.py
    envVars:
      - key: RUN_MODE
        value: close_check
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GH_GIST_TOKEN
        sync: false
      - key: GIST_ID
        sync: false

  - type: cron
    name: stock-agent-weekend
    runtime: python
    schedule: "0 12 * * 0,6"       # 8:00 AM ET (Sat–Sun) — crypto only
    buildCommand: pip install -r requirements.txt
    startCommand: python agent.py
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GH_GIST_TOKEN
        sync: false
      - key: GIST_ID
        sync: false
