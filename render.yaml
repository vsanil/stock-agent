services:
  - type: web
    name: stock-agent-webhook
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn webhook:app
    plan: free
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GH_GIST_TOKEN
        sync: false
      - key: GIST_ID
        sync: false

  # ── Scheduled runs (Render cron — fires on exact UTC time, no GitHub delay) ──

  - type: cron
    name: stock-agent-prescreener
    runtime: python
    schedule: "0 3 * * 1-5"        # 11:00 PM ET / 10:00 PM CDT (Mon–Fri) — pre-score 600 tickers silently
    buildCommand: pip install -r requirements.txt
    startCommand: python agent.py
    envVars:
      - key: RUN_MODE
        value: prescreener
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GH_GIST_TOKEN
        sync: false
      - key: GIST_ID
        sync: false


  - type: cron
    name: stock-agent-morning
    runtime: python
    schedule: "0 11 * * 1-5"       # 7:00 AM ET / 6:00 AM CDT (Mon–Fri) — morning briefing (arrives ~8:30 AM ET, 1 hour before open)
    buildCommand: pip install -r requirements.txt
    startCommand: python agent.py
    envVars:
      - key: RUN_MODE
        value: morning
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GH_GIST_TOKEN
        sync: false
      - key: GIST_ID
        sync: false

  - type: cron
    name: stock-agent-confirmation
    runtime: python
    schedule: "30 14 * * 1-5"      # 10:30 AM ET / 9:30 AM CDT (Mon–Fri) — confirmation run (1 hour after open)
    buildCommand: pip install -r requirements.txt
    startCommand: python agent.py
    envVars:
      - key: RUN_MODE
        value: confirmation
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GH_GIST_TOKEN
        sync: false
      - key: GIST_ID
        sync: false

  - type: cron
    name: stock-agent-eod
    runtime: python
    schedule: "30 19 * * 1-5"      # 3:30 PM ET / 2:30 PM CDT (Mon–Fri) — end-of-day check (30 min before close)
    buildCommand: pip install -r requirements.txt
    startCommand: python agent.py
    envVars:
      - key: RUN_MODE
        value: close_check
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GH_GIST_TOKEN
        sync: false
      - key: GIST_ID
        sync: false

  - type: cron
    name: stock-agent-price-alerts
    runtime: python
    schedule: "*/30 13-20 * * 1-5"  # Every 30 min, 9:30 AM–4:00 PM ET / 8:30 AM–3:00 PM CDT (Mon–Fri)
    buildCommand: pip install -r requirements.txt
    startCommand: python agent.py
    envVars:
      - key: RUN_MODE
        value: price_alerts
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GH_GIST_TOKEN
        sync: false
      - key: GIST_ID
        sync: false
      - key: FINNHUB_API_KEY
        sync: false

  - type: cron
    name: stock-agent-weekend
    runtime: python
    schedule: "0 12 * * 0,6"       # 8:00 AM ET (Sat–Sun) — crypto only
    buildCommand: pip install -r requirements.txt
    startCommand: python agent.py
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GH_GIST_TOKEN
        sync: false
      - key: GIST_ID
        sync: false
