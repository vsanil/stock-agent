services:
  - type: web
    name: stock-agent-webhook
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn webhook:app
    plan: free
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: CALLMEBOT_PHONE
        sync: false
      - key: CALLMEBOT_APIKEY
        sync: false
      - key: GITHUB_GIST_TOKEN
        sync: false
      - key: GIST_ID
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
