name: Daily Stock & Crypto Picks

on:
  schedule:
    - cron: '0 12 * * 1-5'    # 8:00 AM ET = 12:00 UTC (Mon-Fri) — morning briefing
    - cron: '30 14 * * 1-5'   # 10:30 AM ET = 14:30 UTC (Mon-Fri) — confirmation
    - cron: '0 12 * * 0,6'    # 8:00 AM ET on weekends — crypto only
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip sending message (true/false)'
        required: false
        default: 'false'
      mock_data:
        description: 'Use mock data, skip live screeners — fast test (true/false)'
        required: false
        default: 'false'
      run_mode:
        description: 'Force run mode: morning or confirmation (leave blank for auto)'
        required: false
        default: ''

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent
        run: python agent.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_GIST_TOKEN: ${{ secrets.GH_GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          MOCK_DATA: ${{ github.event.inputs.mock_data || 'false' }}
          RUN_MODE: ${{ github.event.inputs.run_mode || '' }}
