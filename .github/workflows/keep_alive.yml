name: Keep Render Webhook Alive

# Pings the Render health endpoint every 14 minutes to prevent the free-tier
# instance from spinning down. Commands like /prices and /perf respond instantly
# instead of waiting 30s for a cold start.
#
# Setup: add RENDER_APP_URL as a GitHub secret (e.g. https://your-app.onrender.com)
# If the secret is not set, this job silently skips — safe to leave in place.

on:
  schedule:
    - cron: '*/14 * * * *'   # Every 14 minutes, all day

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping Render /health
        run: |
          if [ -n "${{ secrets.RENDER_APP_URL }}" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              "${{ secrets.RENDER_APP_URL }}/health")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Render is alive (HTTP $STATUS)"
            else
              echo "⚠️ Render returned HTTP $STATUS — may be waking up"
            fi
          else
            echo "RENDER_APP_URL secret not set — skipping keep-alive ping."
          fi
