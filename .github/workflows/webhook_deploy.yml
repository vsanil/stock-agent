name: Deploy Webhook to Render

on:
  push:
    branches: [main]
    paths:
      - 'webhook.py'
      - 'telegram_notifier.py'
      - 'config_manager.py'
      - 'requirements.txt'
      - 'render.yaml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
            echo "Render deploy triggered."
          else
            echo "RENDER_DEPLOY_HOOK_URL not set — skipping auto-deploy."
            echo "Render will auto-deploy on push if connected to this repo."
          fi
